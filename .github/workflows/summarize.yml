name: Summarize Bills (Background)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 9

    steps:
      - name: Run summarize batches (8x5 = 40 bills)
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            echo "--- Batch $i/8 ---"
            RESPONSE=$(curl -s --max-time 65 \
              "https://billbreakdown.vercel.app/api/cron/summarize?batch=5" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
            echo "$RESPONSE"

            REMAINING=$(echo "$RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('remaining',9999))" 2>/dev/null || echo "9999")

            if [ "$REMAINING" = "0" ]; then
              echo "All bills summarized!"
              exit 0
            fi

            if [ "$i" -lt "8" ]; then sleep 5; fi
          done
